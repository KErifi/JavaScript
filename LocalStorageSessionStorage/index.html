<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Введите контактную информацию</h2>

    <form id="contactForm">
        <input type="text" id="name" placeholder="Имя" required><br><br>
        <input type="tel" id="phone" placeholder="Телефон" required><br><br>
        <input type="email" id="email" placeholder="Email" required><br><br>
        <button type="submit">Сохранить</button>
    </form>

    <h3>Сохранённые данные:</h3>
    <div id="output"></div>

    <h2>Учёт расходов</h2>

    <form id="expenseForm">
        <input type="text" id="description" placeholder="Описание" required>
        <input type="number" id="amount" placeholder="Сумма" required>
        <input type="date" id="date" required>
        <button type="submit">Добавить</button>
    </form>

    <h3>Список расходов:</h3>
    <ul id="expenseList"></ul>

    <h2>Активное время на странице:</h2>
    <p id="timer">0 сек</p>

    <script src="script.js"></script>
</body>

</html>
