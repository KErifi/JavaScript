<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">
        <h1>To-Do List</h1>

        <div class="input-row">
            <input type="text" id="taskInput" placeholder="Добавить задачу">
            <button id="addTask" class="add-btn">Добавить</button>
        </div>

        <div id="taskList" class="task-list"></div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="completed">Выполненные</button>
            <button class="filter-btn" data-filter="active">Невыполненные</button>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
